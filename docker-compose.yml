# docker-compose.yml for rallyOS-hub
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - ./server:/app/server
      - ./shared:/app/shared
      - ./client/dist:/app/client/dist:ro
    networks:
      - rallyos-net

networks:
  rallyos-net:
    driver: bridge