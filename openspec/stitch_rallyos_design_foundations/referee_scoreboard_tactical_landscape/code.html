<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RallyOS - Landscape Scoreboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#1f4e47",
              "secondary-container": "#b9e9e0",
              "outline": "#6c7a77",
              "error": "#ba1a1a",
              "surface-container": "#eceef0",
              "on-primary": "#ffffff",
              "on-error-container": "#93000a",
              "background": "#f7f9fb",
              "surface-container-lowest": "#ffffff",
              "surface-container-highest": "#e0e3e5",
              "outline-variant": "#bbcac6",
              "secondary-fixed-dim": "#a0d0c6",
              "on-tertiary-fixed-variant": "#653e00",
              "surface-container-low": "#f2f4f6",
              "primary-container": "#14b8a6",
              "on-surface-variant": "#3c4947",
              "error-container": "#ffdad6",
              "surface-variant": "#e0e3e5",
              "on-tertiary-fixed": "#2a1700",
              "tertiary-fixed-dim": "#ffb95f",
              "tertiary": "#855300",
              "surface-container-high": "#e6e8ea",
              "primary-fixed": "#71f8e4",
              "on-tertiary": "#ffffff",
              "inverse-on-surface": "#eff1f3",
              "on-secondary-fixed": "#00201c",
              "tertiary-fixed": "#ffddb8",
              "inverse-primary": "#4fdbc8",
              "on-secondary": "#ffffff",
              "on-tertiary-container": "#543300",
              "on-primary-fixed-variant": "#005048",
              "on-error": "#ffffff",
              "inverse-surface": "#2d3133",
              "tertiary-container": "#e49200",
              "primary": "#006b5f",
              "primary-fixed-dim": "#4fdbc8",
              "on-secondary-container": "#3d6b63",
              "on-primary-container": "#00423b",
              "surface-dim": "#d8dadc",
              "on-background": "#191c1e",
              "on-surface": "#191c1e",
              "secondary-fixed": "#bbece2",
              "surface-tint": "#006b5f",
              "surface-bright": "#f7f9fb",
              "surface": "#f7f9fb",
              "secondary": "#38665f",
              "on-primary-fixed": "#00201c"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body flex flex-col">
<!-- Compact Landscape Top Header -->
<header class="bg-background/80 backdrop-blur-md flex justify-between items-center px-6 py-2 w-full z-50 border-b border-outline-variant/10">
<div class="flex items-center gap-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#006b5f] bg-primary-fixed/20 p-1.5 rounded-full text-sm" data-icon="wifi_off">wifi_off</span>
<div class="flex flex-col">
<span class="font-headline font-bold text-sm text-[#191c1e] leading-tight">RallyOS</span>
<span class="font-label text-[9px] uppercase tracking-widest text-primary font-bold leading-none">Synced</span>
</div>
</div>
<div class="h-6 w-px bg-outline-variant/30"></div>
<div class="flex flex-col">
<span class="font-headline font-bold text-[10px] tracking-widest uppercase opacity-60 leading-none">Quarterfinal</span>
<span class="font-label text-[10px] font-bold text-tertiary uppercase tracking-tighter">Live Match</span>
</div>
</div>
<div class="flex items-center bg-surface-container-low px-4 py-1 rounded-full border border-outline-variant/10">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60 font-bold mr-3">Current Sets</span>
<span class="font-headline font-bold text-lg text-primary">2 - 1</span>
</div>
<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-on-surface-variant text-xl" data-icon="settings">settings</button>
<div class="w-8 h-8 rounded-full border border-primary-container overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Referee Portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDhtnew_3aAZKmps5I4AINXsh_IQ7v2exnt0kX_rcFPIWJ7_cF6SpFxJfPsyLCugZch_c9VsNbO6IU90iws7Okri1YaLxCOg0Wl4rysZyFFWJ_Fjn9Kffo_EvDs0Yk-Gjoo3WmT_9JbbTkp-vxfdm_86e-XZVReEPTJSM-qtJkq68qsj844k21Sibg0qJgg5-QyNnThosxovvH08svMVFmRZAuac28IAzGSe35aTrZCThfi4C50p8IZ_7kvAdv2JUThaURdPUbCX1b_"/>
</div>
</div>
</header>
<main class="flex-grow flex w-full relative">
<!-- Player A (Left) -->
<section class="flex-1 bg-surface-container-low flex flex-col relative overflow-hidden">
<!-- Huge Tap Areas -->
<div class="absolute inset-0 flex flex-col">
<button class="flex-1 bg-transparent active:bg-primary/5 transition-colors flex items-start justify-center pt-8 group">
<span class="material-symbols-outlined text-6xl text-primary opacity-20 group-active:opacity-100 group-active:scale-125 transition-all" data-icon="add">add</span>
</button>
<button class="flex-1 bg-transparent active:bg-error/5 transition-colors flex items-end justify-center pb-8 group">
<span class="material-symbols-outlined text-6xl text-on-surface-variant opacity-20 group-active:opacity-100 group-active:scale-125 transition-all" data-icon="remove">remove</span>
</button>
</div>
<!-- Score Display (Centered Overlay) -->
<div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-10">
<div class="text-center mb-[-2rem]">
<h2 class="font-headline font-bold text-2xl tracking-tight text-on-surface">Andres Rojas</h2>
<span class="inline-block px-3 py-0.5 bg-surface-container-highest rounded-full font-label text-[10px] font-bold text-on-surface-variant uppercase">-2 HCP</span>
</div>
<div class="font-headline font-bold text-[22rem] leading-none text-primary tracking-tighter drop-shadow-2xl">10</div>
<div class="flex gap-2 mt-[-1rem]">
<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_8px_rgba(0,107,95,0.5)]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_8px_rgba(0,107,95,0.5)]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant/30"></div>
</div>
</div>
</section>
<!-- Visual Divider -->
<div class="w-px bg-outline-variant/20 relative z-30">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-lg border border-outline-variant/10">
<span class="font-headline font-bold text-[10px] text-outline italic">VS</span>
</div>
</div>
<!-- Player B (Right) -->
<section class="flex-1 bg-background flex flex-col relative overflow-hidden">
<!-- Huge Tap Areas -->
<div class="absolute inset-0 flex flex-col">
<button class="flex-1 bg-transparent active:bg-primary/5 transition-colors flex items-start justify-center pt-8 group">
<span class="material-symbols-outlined text-6xl text-primary opacity-20 group-active:opacity-100 group-active:scale-125 transition-all" data-icon="add">add</span>
</button>
<button class="flex-1 bg-transparent active:bg-error/5 transition-colors flex items-end justify-center pb-8 group">
<span class="material-symbols-outlined text-6xl text-on-surface-variant opacity-20 group-active:opacity-100 group-active:scale-125 transition-all" data-icon="remove">remove</span>
</button>
</div>
<!-- Score Display (Centered Overlay) -->
<div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-10">
<div class="text-center mb-[-2rem]">
<h2 class="font-headline font-bold text-2xl tracking-tight text-on-surface">Carlos Perez</h2>
<span class="inline-block px-3 py-0.5 bg-surface-container-highest rounded-full font-label text-[10px] font-bold text-on-surface-variant uppercase">0 HCP</span>
</div>
<div class="font-headline font-bold text-[22rem] leading-none text-on-surface tracking-tighter drop-shadow-2xl">8</div>
<div class="flex gap-2 mt-[-1rem]">
<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_8px_rgba(0,107,95,0.5)]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant/30"></div>
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant/30"></div>
</div>
</div>
</section>
<!-- Bottom Floating Bar -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-40 flex items-center gap-4">
<button class="bg-white/90 backdrop-blur-xl border border-outline-variant/20 h-14 px-6 rounded-full shadow-xl flex items-center gap-2 text-on-surface-variant hover:bg-white active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="undo">undo</span>
<span class="font-label text-xs font-bold uppercase tracking-widest">Undo Last</span>
</button>
<button class="bg-gradient-to-r from-primary to-primary-container text-white h-16 px-10 rounded-full shadow-2xl shadow-primary/30 flex items-center gap-3 hover:scale-105 active:scale-95 transition-all">
<span class="font-headline font-bold text-sm uppercase tracking-[0.2em]">FINISH MATCH</span>
<span class="material-symbols-outlined" data-icon="sports_tennis">sports_tennis</span>
</button>
<div class="bg-white/90 backdrop-blur-xl border border-outline-variant/20 h-14 px-4 rounded-full shadow-xl flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant/40" data-icon="groups">groups</button>
<button class="material-symbols-outlined text-on-surface-variant/40" data-icon="gavel">gavel</button>
<button class="material-symbols-outlined text-primary" data-icon="scoreboard" style="font-variation-settings: 'FILL' 1;">scoreboard</button>
</div>
</div>
</main>
<!-- Subtle Decor -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-0 left-0 w-[30vw] h-[30vw] rounded-full bg-primary/5 blur-[100px]"></div>
<div class="absolute bottom-0 right-0 w-[30vw] h-[30vw] rounded-full bg-tertiary/5 blur-[100px]"></div>
</div>
</body></html>
