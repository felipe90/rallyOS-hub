services:
  hub:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: rallyos-hub
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "https://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
