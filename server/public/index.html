<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RallyOS Hub - Multi-Table Tournament</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* === CSS VARIABLES === */
        :root {
            --bg-dark: #0F172A;
            --bg-surface: #1E293B;
            --primary: #14B8A6;
            --primary-light: #5EEAD4;
            --secondary: #F59E0B;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --player-a: #3B82F6;
            --player-b: #EF4444;
            --success: #22C55E;
            --warning: #F59E0B;
            --error: #EF4444;
            --border: #334155;
        }

        /* === BASE STYLES === */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === HEADER === */
        .header {
            background: var(--bg-surface);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .logo span { color: var(--primary); }

        .status-dot {
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* === LANDSCAPE OPTIMIZATION (Masive UI) === */
        @media (orientation: landscape) {
            .scoreboard {
                flex-direction: row;
                gap: 20px;
            }
            .scoreboard.swapped {
                flex-direction: row-reverse;
            }
            .score-player {
                padding: 10px;
            }
            .big-score {
                font-size: 35vh; /* Scale with viewport height */
                margin: 0;
            }
            .header {
                padding: 10px 20px;
            }
            .screen {
                max-width: none;
            }
        }

        /* === RESPONSIVE === */
        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-secondary { background: var(--bg-surface); color: var(--text-main); border: 1px solid var(--border); }
        .btn-danger { background: var(--error); color: white; }
        .btn-success { background: var(--success); color: white; }

        /* === SCREENS === */
        .screen {
            display: none;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .screen.active { display: block; }

        /* === HUB DASHBOARD === */
        #tables-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .table-card {
            background: var(--bg-surface);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            position: relative;
        }

        .table-card:hover { border-color: var(--primary); transform: translateY(-2px); }

        .table-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .table-name { font-size: 18px; font-weight: 700; }
        .table-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-WAITING { background: var(--border); color: var(--text-muted); }
        .status-LIVE { background: var(--success); color: white; }
        .status-FINISHED { background: var(--primary); color: white; }

        .table-score {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 32px;
            font-weight: 900;
            margin: 15px 0;
            font-variant-numeric: tabular-nums;
        }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .delete-btn:hover { opacity: 1; }

        /* === SCOREBOARD === */
        .scoreboard {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: calc(100vh - 120px);
        }

        .scoreboard.swapped { flex-direction: column-reverse; }

        .score-player {
            flex: 1;
            background: var(--bg-surface);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            overflow: hidden;
        }

        .player-label { font-size: 12px; font-weight: 800; opacity: 0.6; letter-spacing: 2px; }
        .player-name-display { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
        
        .big-score {
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            margin: 10px 0;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .sets-display { font-size: 20px; font-weight: 700; color: var(--text-muted); }
        .sets-display span { color: white; }

        .serving-indicator {
            position: absolute;
            top: 20px;
            font-size: 40px;
            color: var(--secondary);
            text-shadow: 0 0 20px var(--secondary);
            visibility: hidden;
        }

        .score-controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .score-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 32px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .score-btn:active { transform: scale(0.9); }
        .score-btn.plus { background: var(--success); color: white; }
        .score-btn.minus { background: var(--bg-dark); color: var(--text-muted); border: 2px solid var(--border); }

        /* === UTILS & MODALS === */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: var(--text-muted); }
        .form-input { width: 100%; padding: 15px; border-radius: 12px; background: var(--bg-dark); border: 1px solid var(--border); color: white; font-size: 16px; }

        /* === TRANSITIONS === */
        #overlay-swap {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: var(--secondary);
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 32px;
            font-weight: 900;
            color: black;
            opacity: 0;
            pointer-events: none;
            z-index: 5000;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #overlay-swap.show-swap { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* === HISTORY DRAWER === */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .drawer-overlay.active { display: block; opacity: 1; }

        .drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 85%;
            max-width: 400px;
            height: 100%;
            background: var(--bg-surface);
            z-index: 2001;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transition: right 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }
        .drawer.active { right: 0; }

        .drawer-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .drawer-title { font-size: 20px; font-weight: 900; color: var(--primary); }
        .drawer-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        .drawer-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            padding: 16px;
            border-radius: 16px;
            background: var(--bg-dark);
            border-left: 4px solid var(--border);
            animation: slideIn 0.3s ease-out;
        }
        .history-item.point-a { border-left-color: var(--player-a); }
        .history-item.point-b { border-left-color: var(--player-b); }
        .history-item.set-won { border-left-color: var(--secondary); background: rgba(245, 158, 11, 0.1); }

        .history-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .history-action { font-weight: 800; font-size: 14px; }
        .history-score { font-family: monospace; font-weight: 700; color: var(--text-muted); }
        .history-time { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .empty-state { text-align: center; padding: 100px 20px; opacity: 0.5; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">RALLY<span>OS</span> HUB</div>
        <div id="status" class="status-dot">● CONECTANDO...</div>
        <button class="btn btn-primary" id="btn-new-table">+ Nueva Mesa</button>
    </header>

    <!-- DASHBOARD -->
    <div id="screen-dashboard" class="screen active">
        <div id="tables-container"></div>
    </div>

    <!-- WAITING ROOM -->
    <div id="screen-waiting" class="screen">
        <button class="btn btn-secondary" id="btn-back-to-hub" style="margin-bottom: 20px;">← Volver</button>
        <h1 id="waiting-table-name" style="font-size: 32px; font-weight: 900; margin-bottom: 5px;">Mesa</h1>
        <div class="pin-display" id="waiting-pin">----</div>
        <div id="waiting-players" style="margin: 20px 0;"></div>
        <button class="btn btn-primary" style="width: 100%;" id="btn-configure">Configurar Partido</button>
    </div>

    <!-- SCOREBOARD -->
    <div id="screen-scoreboard" class="screen">
        <div class="scoreboard">
            <div class="score-player" id="box-a">
                <div class="serving-indicator" id="serving-a">★</div>
                <div class="player-label">PLAYER A</div>
                <div class="player-name-display" id="player-a-name" style="color: var(--player-a);">—</div>
                <div class="big-score" id="score-a">0</div>
                <div class="sets-display"><span id="sets-a">0</span> SETS</div>
                <div class="score-controls" id="controls-a" style="display: none;">
                    <button class="score-btn minus" data-player="A">−1</button>
                    <button class="score-btn plus" data-player="A">+1</button>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; padding: 10px; gap: 10px;">
                <button class="btn btn-secondary" id="btn-back-waiting" style="flex:1">← Atrás</button>
                <button class="btn btn-secondary" id="btn-history" style="flex:1">📜 Historial</button>
                <button class="btn btn-secondary" id="btn-undo" style="flex:1" disabled>↩ Deshacer</button>
                <button class="btn btn-danger" id="btn-end-match" style="flex:1">Fin</button>
            </div>

            <div class="score-player" id="box-b">
                <div class="serving-indicator" id="serving-b">★</div>
                <div class="player-label">PLAYER B</div>
                <div class="player-name-display" id="player-b-name" style="color: var(--player-b);">—</div>
                <div class="big-score" id="score-b">0</div>
                <div class="sets-display"><span id="sets-b">0</span> SETS</div>
                <div class="score-controls" id="controls-b" style="display: none;">
                    <button class="score-btn minus" data-player="B">−1</button>
                    <button class="score-btn plus" data-player="B">+1</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="modal-create" class="modal-overlay">
        <div class="modal">
            <h2 class="modal-header">Nueva Mesa</h2>
            <div class="form-group">
                <label class="form-label">Nombre de la mesa</label>
                <input type="text" id="input-table-name" class="form-input" placeholder="Ej: Final A">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" id="btn-cancel-create" style="flex:1">Cancelar</button>
                <button class="btn btn-primary" id="btn-confirm-create" style="flex:2">Crear Mesa</button>
            </div>
        </div>
    </div>

    <div id="modal-setup" class="modal-overlay">
        <div class="modal">
            <h2 class="modal-header">Configurar Partido</h2>
            <div class="form-group">
                <label class="form-label">Jugador A (Azul)</label>
                <input type="text" id="input-player-a" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Jugador B (Rojo)</label>
                <input type="text" id="input-player-b" class="form-input">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div>
                    <label class="form-label">Best of...</label>
                    <div style="display: flex; gap: 8px; background: var(--bg-dark); padding: 8px; border-radius: 10px; justify-content: space-around;">
                        <label style="display: flex; align-items: center; gap: 4px; font-size: 13px;"><input type="radio" name="format" value="1"> 1</label>
                        <label style="display: flex; align-items: center; gap: 4px; font-size: 13px;"><input type="radio" name="format" value="3" checked> 3</label>
                        <label style="display: flex; align-items: center; gap: 4px; font-size: 13px;"><input type="radio" name="format" value="5"> 5</label>
                        <label style="display: flex; align-items: center; gap: 4px; font-size: 13px;"><input type="radio" name="format" value="7"> 7</label>
                    </div>
                </div>
                <div>
                    <label class="form-label">Pts x Set</label>
                    <div style="display: flex; gap: 8px; background: var(--bg-dark); padding: 8px; border-radius: 10px; justify-content: space-around;">
                        <label style="display: flex; align-items: center; gap: 4px; font-size: 13px;"><input type="radio" name="ptsPerSet" value="11" checked> 11</label>
                        <label style="display: flex; align-items: center; gap: 4px; font-size: 13px;"><input type="radio" name="ptsPerSet" value="15"> 15</label>
                        <label style="display: flex; align-items: center; gap: 4px; font-size: 13px;"><input type="radio" name="ptsPerSet" value="21"> 21</label>
                    </div>
                </div>
            </div>
            <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label class="form-label">Handicap A</label>
                    <input type="number" id="handicap-a" class="form-input" value="0">
                </div>
                <div>
                    <label class="form-label">Handicap B</label>
                    <input type="number" id="handicap-b" class="form-input" value="0">
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" id="btn-cancel-setup" style="flex:1">Cancelar</button>
                <button class="btn btn-success" id="btn-confirm-setup" style="flex:2">Iniciar Partido</button>
            </div>
        </div>
    </div>

    <div id="overlay-swap">🔄 CAMBIO DE LADO</div>

    <!-- HISTORY DRAWER -->
    <div id="drawer-overlay" class="drawer-overlay"></div>
    <div id="drawer-history" class="drawer">
        <div class="drawer-header">
            <div class="drawer-title">HISTORIAL</div>
            <button class="drawer-close" id="btn-close-history">×</button>
        </div>
        <div class="drawer-content" id="history-content">
            <!-- Items injected by JS -->
        </div>
    </div>

    <script>
        // Trusted Types Bypass logic for strict environments
        if (window.trustedTypes && window.trustedTypes.createPolicy && !window.trustedTypes.defaultPolicy) {
            window.trustedTypes.createPolicy('default', {
                createHTML: (string) => string,
                createScriptURL: (string) => string,
                createScript: (string) => string,
            });
        }

        let socket;
        let currentTableId = null;
        let isReferee = false;
        let tables = [];
        let lastSwappedSides = null;

        function init() {
            socket = io();
            setupSocketListeners();
            setupUIListeners();
        }

        function setupSocketListeners() {
            socket.on('connect', () => {
                const status = document.getElementById('status');
                status.textContent = '● CONECTADO';
                status.style.color = 'var(--success)';
                if (currentTableId) socket.emit('JOIN_TABLE', { tableId: currentTableId, name: 'Viewer' });
            });

            socket.on('disconnect', () => {
                const status = document.getElementById('status');
                status.textContent = '○ DESCONECTADO';
                status.style.color = 'var(--error)';
            });

            socket.on('TABLE_LIST', (list) => {
                const isFirstLoad = tables.length === 0;
                tables = list;
                if (isFirstLoad) renderTables();
                else {
                    // Update existing cards to avoid full re-render flickering
                    tables.forEach(t => updateTableCard(t));
                }
            });

            socket.on('TABLE_UPDATE', (table) => {
                const index = tables.findIndex(t => t.id === table.id);
                if (index !== -1) {
                    tables[index] = table;
                } else {
                    tables.push(table);
                    renderTables(); // New table added
                }
                updateTableCard(table);
                if (currentTableId === table.id) updateWaitingRoom(table);
            });

            socket.on('TABLE_JOINED', (data) => {
                currentTableId = data.tableId;
                showScreen('screen-waiting');
            });

            socket.on('MATCH_UPDATE', (state) => {
                updateScoreboard(state);
            });

            socket.on('REF_SET', () => {
                isReferee = true;
                const controlsA = document.getElementById('controls-a');
                const controlsB = document.getElementById('controls-b');
                if (controlsA) controlsA.style.display = 'flex';
                if (controlsB) controlsB.style.display = 'flex';
                socket.emit('REQUEST_TABLE_STATE', { tableId: currentTableId });
            });

            socket.on('TABLE_DELETED', (data) => {
                tables = tables.filter(t => t.id !== data.tableId);
                renderTables();
                if (currentTableId === data.tableId) {
                    alert('Mesa eliminada.');
                    showScreen('screen-dashboard');
                }
            });

            socket.on('ERROR', (err) => alert(err.message || 'Error'));
        }

        function setupUIListeners() {
            // Dashboard delegation
            document.body.addEventListener('click', (e) => {
                const target = e.target;
                const action = target.dataset.action || target.closest('[data-action]')?.dataset.action;
                const id = target.dataset.id || target.closest('[data-id]')?.dataset.id;
                
                if (action === 'join') socket.emit('JOIN_TABLE', { tableId: id, name: 'Viewer' });
                if (action === 'delete') {
                    const pin = prompt('PIN de seguridad:');
                    if (pin) socket.emit('DELETE_TABLE', { tableId: id, pin });
                }
                
                // Score buttons
                if (target.classList.contains('score-btn')) {
                    const player = target.dataset.player;
                    const isPlus = target.classList.contains('plus');
                    if (isPlus) socket.emit('RECORD_POINT', { tableId: currentTableId, player });
                    else socket.emit('SUBTRACT_POINT', { tableId: currentTableId, player });
                }
            });

            document.getElementById('btn-new-table').onclick = () => document.getElementById('modal-create').classList.add('active');
            document.getElementById('btn-cancel-create').onclick = () => document.getElementById('modal-create').classList.remove('active');
            document.getElementById('btn-confirm-create').onclick = () => {
                const name = document.getElementById('input-table-name').value;
                socket.emit('CREATE_TABLE', { name });
                document.getElementById('modal-create').classList.remove('active');
            };

            document.getElementById('btn-back-to-hub').onclick = () => showScreen('screen-dashboard');
            
            document.getElementById('btn-configure').onclick = () => {
                if (isReferee) document.getElementById('modal-setup').classList.add('active');
                else {
                    const pin = prompt('PIN del Referee:');
                    if (pin) socket.emit('SET_REF', { tableId: currentTableId, pin });
                }
            };

            document.getElementById('btn-confirm-setup').onclick = () => {
                const handicapA = parseInt(document.getElementById('handicap-a').value) || 0;
                const handicapB = parseInt(document.getElementById('handicap-b').value) || 0;
                
                const config = {
                    tableId: currentTableId,
                    playerNames: { 
                        a: document.getElementById('input-player-a').value || 'Azul', 
                        b: document.getElementById('input-player-b').value || 'Rojo' 
                    },
                    format: parseInt(document.querySelector('input[name="format"]:checked').value),
                    ptsPerSet: parseInt(document.querySelector('input[name="ptsPerSet"]:checked').value),
                    handicap: { a: handicapA, b: handicapB }
                };
                socket.emit('CONFIGURE_MATCH', config);
                document.getElementById('modal-setup').classList.remove('active');
                showScreen('screen-scoreboard');
                setTimeout(() => socket.emit('START_MATCH', { tableId: currentTableId }), 100);
            };

            document.getElementById('btn-cancel-setup').onclick = () => document.getElementById('modal-setup').classList.remove('active');
            
            document.getElementById('btn-undo').onclick = () => socket.emit('UNDO_LAST', { tableId: currentTableId });
            document.getElementById('btn-history').onclick = () => showHistory();
            document.getElementById('btn-close-history').onclick = () => hideHistory();
            document.getElementById('drawer-overlay').onclick = () => hideHistory();
            
            document.getElementById('btn-end-match').onclick = () => {
                if (confirm('¿Terminar partido?')) {
                    socket.emit('RESET_TABLE', { tableId: currentTableId });
                    showScreen('screen-dashboard');
                }
            };
            document.getElementById('btn-back-waiting').onclick = () => showScreen('screen-waiting');
        }

        function renderTables() {
            const container = document.getElementById('tables-container');
            if (tables.length === 0) {
                container.innerHTML = '<div class="empty-state">No hay mesas activas</div>';
                return;
            }
            container.innerHTML = tables.map(t => `
                <div class="table-card" id="card-${t.id}">
                    <div class="table-card-header">
                        <div class="table-name">${t.name}</div>
                        <button class="delete-btn" data-action="delete" data-id="${t.id}">🗑️</button>
                    </div>
                    <div class="table-status status-${t.status}" id="card-status-${t.id}">${t.status}</div>
                    <div class="table-score">
                        <span id="card-score-a-${t.id}">${t.currentScore?.a || 0}</span>
                        <span>-</span>
                        <span id="card-score-b-${t.id}">${t.currentScore?.b || 0}</span>
                    </div>
                    <div style="font-size: 13px; color: var(--text-muted); text-align: center;">PIN: ${t.pin}</div>
                    <button class="btn btn-secondary" style="width: 100%; margin-top: 15px;" data-action="join" data-id="${t.id}">Entrar</button>
                </div>
            `).join('');
        }

        function updateTableCard(t) {
            const card = document.getElementById(`card-${t.id}`);
            if (!card) return;
            document.getElementById(`card-status-${t.id}`).textContent = t.status;
            document.getElementById(`card-status-${t.id}`).className = `table-status status-${t.status}`;
            if (t.currentScore) {
                document.getElementById(`card-score-a-${t.id}`).textContent = t.currentScore.a;
                document.getElementById(`card-score-b-${t.id}`).textContent = t.currentScore.b;
            }
        }

        function updateWaitingRoom(t) {
            document.getElementById('waiting-table-name').textContent = t.name;
            document.getElementById('waiting-pin').textContent = t.pin;
            const btn = document.getElementById('btn-configure');
            if (isReferee) btn.textContent = '⚙️ Configurar Partido';
            else btn.textContent = '🔒 Ingresar como Referee';
        }

        function updateScoreboard(state) {
            document.getElementById('player-a-name').textContent = state.playerNames?.a || 'Azul';
            document.getElementById('player-b-name').textContent = state.playerNames?.b || 'Rojo';
            document.getElementById('score-a').textContent = state.score.currentSet.a;
            document.getElementById('score-b').textContent = state.score.currentSet.b;
            document.getElementById('sets-a').textContent = state.score.sets.a;
            document.getElementById('sets-b').textContent = state.score.sets.b;
            
            document.getElementById('serving-a').style.visibility = state.score.serving === 'A' ? 'visible' : 'hidden';
            document.getElementById('serving-b').style.visibility = state.score.serving === 'B' ? 'visible' : 'hidden';
            
            const undo = document.getElementById('btn-undo');
            undo.disabled = !state.undoAvailable;
            undo.style.opacity = state.undoAvailable ? '1' : '0.3';

            const scoreboard = document.querySelector('.scoreboard');
            if (state.swappedSides) scoreboard.classList.add('swapped');
            else scoreboard.classList.remove('swapped');

            if (state.swappedSides !== lastSwappedSides && state.status === 'LIVE') {
                const overlay = document.getElementById('overlay-swap');
                overlay.classList.add('show-swap');
                setTimeout(() => overlay.classList.remove('show-swap'), 2000);
            }
            lastSwappedSides = state.swappedSides;

            // Update History
            if (state.history) renderHistory(state.history, state.playerNames);

            // === WIN CONDITIONS ===
            if (state.status === 'FINISHED' && state.winner) {
                const winnerName = state.winner === 'A'
                    ? (state.playerNames?.a || 'Azul')
                    : (state.playerNames?.b || 'Rojo');

                // Highlight winner box
                document.getElementById('box-a').style.background =
                    state.winner === 'A' ? 'linear-gradient(135deg, #14B8A6, #0D9488)' : 'var(--bg-surface)';
                document.getElementById('box-b').style.background =
                    state.winner === 'B' ? 'linear-gradient(135deg, #14B8A6, #0D9488)' : 'var(--bg-surface)';

                // Disable score controls
                document.querySelectorAll('.score-btn').forEach(btn => btn.disabled = true);
                undo.disabled = true;
                undo.style.opacity = '0.3';

                // Show winner overlay if not already shown
                if (!document.getElementById('overlay-winner')) {
                    const el = document.createElement('div');
                    el.id = 'overlay-winner';
                    el.style.cssText = `
                        position:fixed; inset:0; background:rgba(0,0,0,0.85);
                        display:flex; flex-direction:column; align-items:center;
                        justify-content:center; z-index:9999; gap:20px;
                    `;
                    el.innerHTML = `
                        <div style="font-size:80px">🏆</div>
                        <div style="font-size:42px; font-weight:900; color:var(--primary)">¡GANADOR!</div>
                        <div style="font-size:32px; font-weight:700; color:white">${winnerName}</div>
                        <div style="font-size:18px; color:var(--text-muted)">Sets: ${state.score.sets.a} - ${state.score.sets.b}</div>
                        <button id="btn-dismiss-winner" style="
                            margin-top:20px; padding:16px 40px; border-radius:14px;
                            background:var(--primary); border:none; color:white;
                            font-size:18px; font-weight:700; cursor:pointer;
                        ">Cerrar partido</button>
                    `;
                    document.body.appendChild(el);
                    document.getElementById('btn-dismiss-winner').onclick = () => {
                        el.remove();
                        socket.emit('RESET_TABLE', { tableId: currentTableId });
                        showScreen('screen-dashboard');
                    };
                }
            }
        } // end updateScoreboard

        function showHistory() {
            document.getElementById('drawer-overlay').classList.add('active');
            document.getElementById('drawer-history').classList.add('active');
        }

        function hideHistory() {
            document.getElementById('drawer-overlay').classList.remove('active');
            document.getElementById('drawer-history').classList.remove('active');
        }

        function renderHistory(history, names) {
            const container = document.getElementById('history-content');
            if (!history || history.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5;">Sin movimientos todavía</div>';
                return;
            }

            // Show last 50 items, newest first
            const items = [...history].reverse().slice(0, 50);
            
            container.innerHTML = items.map(item => {
                const isSetWon = item.action === 'SET_WON';
                const isWinnerA = item.player === 'A';
                const name = isWinnerA ? (names?.a || 'Jugador A') : (names?.b || 'Jugador B');
                const time = new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                if (isSetWon) {
                    return `
                        <div class="history-item set-won">
                            <div class="history-main">
                                <div class="history-action">🏆 SET PARA ${name.toUpperCase()}</div>
                                <div class="history-score">${item.pointsBefore.a} - ${item.pointsBefore.b}</div>
                            </div>
                            <div class="history-time">${time}</div>
                        </div>
                    `;
                }

                const typeClass = isWinnerA ? 'point-a' : 'point-b';
                const actionText = item.action === 'CORRECTION' ? 'CORRECCIÓN' : 'PUNTO';
                
                return `
                    <div class="history-item ${typeClass}">
                        <div class="history-main">
                            <div class="history-action">${actionText} PARA ${name.toUpperCase()}</div>
                            <div class="history-score">${item.pointsBefore.a}-${item.pointsBefore.b} → ${item.pointsAfter.a}-${item.pointsAfter.b}</div>
                        </div>
                        <div class="history-time">${time}</div>
                    </div>
                `;
            }).join('');
        }

        function showSetWonOverlay(data) {
            const overlay = document.createElement('div');
            overlay.className = 'overlay-set-won';
            overlay.id = 'overlay-set-won';
            overlay.innerHTML = `
                <div class="overlay-content">
                    <div style="font-size: 24px; font-weight: 800; color: var(--secondary);">¡SET FINALIZADO!</div>
                    <div style="font-size: 64px; font-weight: 900; margin: 20px 0;">${data.score.a} - ${data.score.b}</div>
                    <div style="font-size: 20px; font-weight: 700; opacity: 0.8;">Ganador: ${data.winner === 'A' ? 'Jugador A' : 'Jugador B'}</div>
                </div>
            `;
            document.body.appendChild(overlay);
            
            setTimeout(() => overlay.remove(), 4000);
        }

        function showMatchWonOverlay(data) {
            // This is already handled by updateScoreboard and the existing UI logic,
            // but we can add confetti or sound here if needed.
            console.log('Match Won Event Received:', data);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'screen-dashboard') currentTableId = null;
        }

        window.onload = init;
    </script>
</body>
</html>
